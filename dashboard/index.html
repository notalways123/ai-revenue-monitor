<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Revenue Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #131a2a;
    --surface2: #1a2235;
    --border: #243049;
    --text: #e2e8f0;
    --text2: #8892a4;
    --anthro: #d4a44c;
    --anthro-light: rgba(212,164,76,0.15);
    --openai: #10a37f;
    --openai-light: rgba(16,163,127,0.15);
    --danger: #ef4444;
    --warning: #f59e0b;
    --info: #3b82f6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; line-height:1.5; }
  .header { padding:20px 32px 12px; display:flex; align-items:center; justify-content:space-between; }
  .header h1 { font-size:18px; font-weight:600; letter-spacing:-0.02em; }
  .header .subtitle { color:var(--text2); font-size:12px; margin-top:2px; }
  .metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; margin:0 32px 20px; }
  .metric-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 16px; }
  .metric-card .label { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; }
  .metric-card .value { font-size:20px; font-weight:700; margin-top:3px; }
  .metric-card .sub { font-size:11px; color:var(--text2); margin-top:1px; }
  .metric-card.anthro .value { color:var(--anthro); }
  .metric-card.openai .value { color:var(--openai); }
  .charts { display:flex; flex-direction:column; gap:16px; padding:0 32px; }
  .chart-box { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; }
  .chart-title { font-size:13px; font-weight:600; margin-bottom:8px; color:var(--text2); }
  .chart-container { width:100%; height:360px; }
  .chart-container.tall { height:420px; }
  .generated { text-align:right; font-size:11px; color:var(--text2); padding:12px 32px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>AI Revenue Monitor</h1>
    <div class="subtitle">Anthropic & OpenAI annualized revenue tracking, forecast & targets</div>
  </div>
  <div id="header-metrics" style="display:flex;gap:24px;font-size:13px;"></div>
</div>

<div class="metrics" id="key-metrics"></div>

<div class="charts">
  <div class="chart-box">
    <div class="chart-title">Actual ARR — Anthropic vs OpenAI</div>
    <div class="chart-container tall" id="chart-actual"></div>
  </div>
  <div class="chart-box">
    <div class="chart-title">Anthropic — Historical ARR, Forecast & Target</div>
    <div class="chart-container tall" id="chart-anthro-detail"></div>
  </div>
  <div class="chart-box">
    <div class="chart-title">OpenAI — Historical ARR, Forecast & Target</div>
    <div class="chart-container tall" id="chart-openai-detail"></div>
  </div>
</div>

<div class="generated" id="generated-at"></div>

<script src="js/data-loader.js"></script>
<script src="js/charts.js"></script>
<script src="js/comparability.js"></script>
</body>
</html>
